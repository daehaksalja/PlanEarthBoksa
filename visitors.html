<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>방문자 통계 대시보드 — PLANEARTH</title>
  <link rel="stylesheet" href="css/admin.css" />
  <style>
    .wrap { max-width: 980px; margin: 24px auto; padding: 0 12px; }
    .cards { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .card { padding: 14px; border-radius: 12px; background: rgba(255,255,255,0.03); }
    .hstack { display:flex; gap: 8px; }
    .btn { padding: 4px 10px; border-radius: 999px; background:#0c2a24; color:#aaf1d8; cursor:pointer; }
    .btn.active { background:#14caa1; color:#021b14; }
    #spark svg { width:100%; height:64px; display:block; }
    pre#raw { max-height: 220px; overflow:auto; background:#021b14; color:#bfffe7; padding:10px; border-radius:8px; }
    @media (max-width: 840px){ .cards { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <main class="wrap">
    <h1>방문자 통계 대시보드</h1>

    <div class="hstack" style="margin:12px 0 18px;">
      <span>기간:</span>
      <button class="btn" data-days="7">7일</button>
      <button class="btn" data-days="30">30일</button>
      <button class="btn" data-days="90">90일</button>
    </div>

    <section class="cards">
      <div class="card">총 방문수<br><strong id="total">-</strong></div>
      <div class="card">평균(일)<br>
        <strong id="avg">-</strong><br>
        <small>피크: <span id="peak">-</span></small>
      </div>
      <div class="card">최근 방문 추이<div id="spark"></div></div>
    </section>

    <section style="margin-top:22px;">
      <h2>상위 페이지 (상위 20)</h2>
      <div id="top-pages">로딩 중…</div>
    </section>

    <section style="margin-top:22px;">
      <h2>상위 유입(Referrers)</h2>
      <div id="top-referrers">로딩 중…</div>
    </section>

    <section style="margin-top:22px;">
      <h2>국가 / 지역 (가능 시)</h2>
      <div id="top-countries">로딩 중…</div>
    </section>

    <section style="margin-top:22px;">
      <h2>원시 응답 (디버그)</h2>
      <pre id="raw">-</pre>
    </section>
  </main>

  <script src="js/goat-stats.js"></script>
</body>
</html>
