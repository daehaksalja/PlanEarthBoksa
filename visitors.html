<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>방문자 통계 대시보드 — PLANEARTH</title>
  <link rel="stylesheet" href="css/admin.css">
  <style>
    .pill { display:inline-block; padding:6px 10px; border:1px solid #134; border-radius:999px; margin-right:6px; cursor:pointer; user-select:none }
    .pill.active { background:#0f3; color:#00120d; border-color:#0f3; }
    .cards { display:flex; gap:16px; flex-wrap:wrap; margin:12px 0 18px; }
    .card { flex:1 1 260px; background:#061d18; border:1px solid #10302a; border-radius:12px; padding:14px; }
    .metric { font-size:28px; font-weight:700; margin-top:4px }
    #spark svg { width:100%; height:64px; }
    table.simple { width:100%; border-collapse:collapse; }
    table.simple td { padding:8px 6px; border-bottom:1px solid #0a2c25; }
    table.simple tr:hover { background:#07231d; }
    .rank { color:#9feccf; width:36px }
    .right { text-align:right; color:#bfffe7; width:120px }
    pre#raw { max-height:240px; overflow:auto; background:#021b14; color:#bfffe7; padding:10px; border-radius:8px; }
  </style>
</head>
<body>
  <main class="wrap entry-animate" style="max-width:1100px; margin-top:20px;">
    <h1>방문자 통계 대시보드</h1>

    <div style="margin:8px 0 6px;">
      기간:
      <span class="pill" data-days="7">7일</span>
      <span class="pill" data-days="30">30일</span>
      <span class="pill" data-days="90">90일</span>
    </div>

    <section class="cards">
      <div class="card">
        총 방문수
        <div class="metric" id="total">-</div>
      </div>
      <div class="card">
        평균(일)
        <div class="metric" id="avg">-</div>
        <div style="opacity:.7;font-size:12px">피크: <span id="peak">-</span></div>
      </div>
      <div class="card">
        최근 30일 방문 추이
        <div id="spark" style="height:64px; margin-top:8px;"></div>
      </div>
    </section>

    <section style="margin-top:10px;">
      <h2>상위 페이지 (상위 20)</h2>
      <div id="top-pages">데이터 없음</div>
    </section>

    <section style="margin-top:10px;">
      <h2>상위 유입(Referrers)</h2>
      <div id="top-refs">데이터 없음</div>
    </section>

    <section style="margin-top:10px;">
      <h2>국가 / 지역 (가능 시)</h2>
      <div id="top-countries">데이터 없음</div>
    </section>

    <section style="margin-top:14px;">
      <h2>원시 응답 (디버그)</h2>
      <pre id="raw">-</pre>
    </section>
  </main>

  <script src="js/goat-stats.js"></script>
</body>
</html>
